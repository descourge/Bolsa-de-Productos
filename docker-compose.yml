services:

  app:
    build:
      context: ./laravel-app
      dockerfile: Dockerfile

    container_name: laravel-app

    volumes:
      - ./laravel-app:/var/www
      - vendor_data:/var/www/vendor

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - python-service

    networks:
      - app-network

  nginx:
    image: nginx:latest

    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./laravel-app:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - app-network

  postgres:
    image: postgres:17

    container_name: postgres

    environment:
      POSTGRES_DB: contracts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - app-network

  python-service:
    build:
      context: ./python-service

    container_name: python-service

    ports:
      - "8001:8000"

    networks:
      - app-network

volumes:
  postgres_data:
  vendor_data:

networks:
  app-network: